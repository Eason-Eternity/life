<div class="diary-title">我们的翻完了</div>
<div class="diary-content">
    <p>1600多天，像翻完了一本很厚的书。</p>
    <p>我曾经以为只要我足够努力、足够用心，结局就不会走样。后来发现，感情不是一个人能写完的故事。</p>
    <p>你教会我认真，也教会我遗憾。我不怪你，也不怪自己。只是有点可惜——可惜时间不会停在最好的时候。</p>
    <p>这本日记就写到这里了。以后的日子，我会好好过。你也是。</p>
</div>
