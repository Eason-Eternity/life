<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>宇 & 牛 · 我们的回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://yushao-img.oss-cn-beijing.aliyuncs.com/412eee5c13253f8ecb2192d8f4eab66a.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 极简容器 */
        .container {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        /* 三个小按钮 */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 0 0 2rem 0;
        }

        .btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 0.45rem 1.1rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 245, 0.9);
            transition: all 0.2s ease;
            border: 0.5px solid rgba(255,255,245,0.4);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            color: white;
            border-color: rgba(255,255,245,0.7);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* 计时器小字 */
        .timer {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            display: inline-block;
            font-size: 0.7rem;
            color: rgba(255,255,240,0.9);
            letter-spacing: 0.5px;
        }

        /* 右下角小字 */
        .footer {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.6rem;
            color: rgba(255,255,240,0.55);
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }

        @media (max-width: 480px) {
            .buttons {
                gap: 0.9rem;
            }
            .btn {
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="buttons">
            <a href="#" class="btn">📸 合照区</a>
            <a href="#" class="btn">😂 丑照区</a>
            <a href="#" class="btn">📖 日记区</a>
        </div>
        <div class="timer" id="loveTimer">💙 加载中...</div>
    </div>
    <div class="footer">
        ✨ 我们的博物馆 ✨
    </div>

    <script>
        function updateLoveTimer() {
            const start = new Date('2021-10-29T06:00:00');
            const now = new Date();
            const diff = now - start;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('loveTimer').innerHTML = 
                `💙 在一起 ${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
        }

        setInterval(updateLoveTimer, 1000);
        updateLoveTimer();
    </script>
</body>
</html>
