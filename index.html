<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 宇 & 牛 · 我们的日常</title>
    <link rel="icon" href="https://s41.ax1x.com/2026/02/16/pZLbcOe.png" type="image/jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8cdda 0%, #a1c4fd 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 2rem 1.8rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 400;
            color: #4a3b47;
            letter-spacing: 2px;
        }

        .timer {
            font-size: 1.3rem;
            color: #b5838d;
            background: rgba(255, 255, 255, 0.4);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            margin-top: 0.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 1rem;
        }

        .nav a {
            color: #7a6a7a;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .nav a:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
            padding-bottom: 1.5rem;
        }

        .entry:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .entry-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .entry-date {
            font-size: 1rem;
            color: #b5838d;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.2rem 1rem;
            border-radius: 30px;
            display: inline-block;
        }

        .entry-weather {
            font-size: 0.9rem;
            color: #7a6a7a;
        }

        .entry-content {
            line-height: 1.8;
            color: #2c3e50;
        }

        .entry-content p {
            margin-bottom: 1rem;
        }

        .entry-tags {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(181, 131, 141, 0.2);
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #b5838d;
            border: 1px solid rgba(181, 131, 141, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            color: #7a6a7a;
            font-size: 0.85rem;
        }

        .heart {
            color: #f8a5a5;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <h1>💙 宇 & 牛</h1>
                <div class="timer" id="loveTimer"></div>
            </div>

            <div class="nav">
                <a href="/">首页</a>
                <a href="/about.html">关于我们</a>
            </div>

            <div class="timeline">
                <!-- 第一篇日记 -->
                <div class="entry">
                    <div class="entry-header">
                        <span class="entry-date">2026.02.23</span>
                        <span class="entry-weather">☁️ 多云</span>
                    </div>
                    <div class="entry-content">
                        <p>今天终于把阿里云OSS图床配通了。从下午折腾到晚上，经历了403、SignatureDoesNotMatch……但最后看到图片在网站里显示出来的时候，好想让你也看看。</p>
                        <p>以后我们拍的照片，就存这里了，不会丢。</p>
                    </div>
                    <div class="entry-tags">
                        <span class="tag">#图床</span>
                        <span class="tag">#写给牛</span>
                    </div>
                </div>

                <!-- 第二篇日记 -->
                <div class="entry">
                    <div class="entry-header">
                        <span class="entry-date">2026.02.15</span>
                        <span class="entry-weather">☀️ 晴</span>
                    </div>
                    <div class="entry-content">
                        <p>监控系统终于调通了，以后网盘链接挂了我会第一时间知道。想到你之前说“你折腾这些有什么用”，但你知道的，我喜欢把东西弄得稳稳的。</p>
                        <p>就像对你一样。</p>
                    </div>
                    <div class="entry-tags">
                        <span class="tag">#监控系统</span>
                        <span class="tag">#写给牛</span>
                    </div>
                </div>
            </div>

            <div class="footer">
                <p>✦ 每一天都想和你分享 ✦</p>
                <p style="margin-top: 1rem;">
                    <span class="heart">❤️</span> 宇 & 牛 <span class="heart">❤️</span>
                </p>
                <p style="margin-top: 1rem; font-size: 0.75rem; opacity: 0.6;">Design by DeepSeek</p>
            </div>
        </div>
    </div>

    <script>
        function updateLoveTimer() {
            // ✨ 重要：把这里改成你们真正在一起的那一天！
            const startDate = new Date('2021-10-29T06:00:00');  // 
            
            const now = new Date();
            const diff = now - startDate;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('loveTimer').innerHTML = 
                `💙 在一起 ${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
        }

        setInterval(updateLoveTimer, 1000);
        updateLoveTimer();
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
