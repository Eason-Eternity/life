<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>山形日记 · 关停</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', '宋体', serif;
        }
        .shutdown {
            text-align: center;
            color: #e0e0e0;
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 300;
            letter-spacing: 4px;
            line-height: 1.3;
            padding: 1rem;
        }
        .shutdown p:first-child {
            font-size: clamp(2.5rem, 12vw, 6rem);
            font-weight: 500;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="shutdown">
        <p>该网站已关停</p>
        <p>山形 · 停笔</p>
    </div>
</body>
</html>
