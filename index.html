<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📖 宇 & 牛 · 日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Times New Roman', '宋体', 'Georgia', serif;
            padding: 2rem 1rem;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .diary {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            padding: 2rem 1.8rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        /* 日期 */
        .date {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4a4a4a;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eaeaea;
        }

        /* 正文 */
        .entry {
            margin-bottom: 2.5rem;
        }

        .entry-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #111;
        }

        .entry-content {
            font-size: 1rem;
            color: #2c2c2c;
            text-align: justify;
        }

        .entry-content p {
            margin-bottom: 1.2rem;
        }

        /* 底部 */
        .footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid #eaeaea;
            font-size: 0.7rem;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="diary">
        <div class="date">2026.04.20  ·  22:00</div>

        <div class="entry">
            <div class="entry-title">最后一页</div>
            <div class="entry-content">
                <p>1600多天，像翻完了一本很厚的书。</p>
                <p>我曾经以为只要我足够努力、足够用心，结局就不会走样。后来发现，感情不是一个人能写完的故事。</p>
                <p>你教会我认真，也教会我遗憾。我不怪你，也不怪自己。只是有点可惜——可惜时间不会停在最好的时候。</p>
                <p>这本日记就写到这里了。以后的日子，我会好好过。你也是。</p>
                <p style="margin-top: 1.8rem;">—— 宇</p>
            </div>
        </div>

        <div class="footer">🚲 没有终点 · 只是换了一条路</div>
    </div>
</body>
</html>
