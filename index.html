<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💙 宇 & 牛 · 回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(1px);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video autoplay muted playsinline id="bgVideo">
        <source src="https://yushao-img.oss-cn-beijing.aliyuncs.com/1848b97a2edf7ed1d45ca4a45d1ac3c6.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <script>
        const video = document.getElementById('bgVideo');
        video.addEventListener('ended', () => {
            window.location.href = '/directory.html';
        });
    </script>
</body>
</html>
